<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{.Sandbox.BrandName}} Rewards</title>
        <link rel="stylesheet" href="/static/app.css" />
        <script type="module" src="/static/app.js"></script>
    </head>
    <body
        class="store palette-{{.Sandbox.Palette}}"
        data-sandbox-slug="{{.Sandbox.Slug}}"
    >
        {{template "sandbox_bar" .}}
        <header class="shop-header">
            <nav class="shop-nav">
                <a class="brand-stack" href="/storefront/{{.Sandbox.Slug}}"
                    ><span>{{.Sandbox.BrandName}}</span></a
                >
                <div class="nav-links">
                    <a href="/storefront/{{.Sandbox.Slug}}">Shop</a>
                    <a href="/storefront/{{.Sandbox.Slug}}/apps/rewards"
                        >Rewards</a
                    >
                </div>
            </nav>
        </header>
        <main class="rewards-page">
            <p class="breadcrumb centered">Home / Rewards</p>
            <section class="iframe-frame">
                <iframe
                    id="rewards-frame"
                    title="{{.Sandbox.BrandName}} Rewards"
                    src="{{.IframeURL}}"
                    sandbox="allow-top-navigation allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin"
                    allow="clipboard-write"
                ></iframe>
            </section>
        </main>
        <dialog id="app-popup" class="popup-dialog">
            <button
                class="popup-close"
                type="button"
                aria-label="Close popup"
                data-close-popup
            >
                &times;
            </button>
            <iframe id="app-popup-frame" title="Loyalty popup"></iframe>
        </dialog>
    </body>
</html>
